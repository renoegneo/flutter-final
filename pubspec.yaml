name: schedule_app
description: A schedule management app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (управление состоянием)
  provider: ^6.1.1

  # Local storage (локальное хранилище)
  shared_preferences: ^2.2.2

  # File picker (выбор файла)
  file_picker: ^6.1.1

  # CSV parsing
  csv: ^5.1.1

  # Excel parsing
  excel: ^4.0.2

  # Date formatting
  intl: ^0.19.0

  # Path for saving files
  path_provider: ^2.1.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
